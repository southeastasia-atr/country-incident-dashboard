<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Incident Map - Philippines</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='140 150 420 320'%3E%3Cstyle%3E.e%7Bstroke:%233a5f82;stroke-width:6;fill:none;stroke-linecap:round%7D.nb%7Bfill:%234d90c4%7D.no%7Bfill:%23e8962a%7D%3C/style%3E%3Cline class='e' x1='190' y1='220' x2='310' y2='295'/%3E%3Cline class='e' x1='190' y1='220' x2='295' y2='185'/%3E%3Cline class='e' x1='190' y1='220' x2='265' y2='340'/%3E%3Cline class='e' x1='295' y1='185' x2='420' y2='220'/%3E%3Cline class='e' x1='265' y1='340' x2='310' y2='295'/%3E%3Cline class='e' x1='265' y1='340' x2='355' y2='430'/%3E%3Cline class='e' x1='355' y1='355' x2='310' y2='295'/%3E%3Cline class='e' x1='355' y1='355' x2='420' y2='220'/%3E%3Cline class='e' x1='355' y1='355' x2='460' y2='320'/%3E%3Cline class='e' x1='355' y1='355' x2='355' y2='430'/%3E%3Cline class='e' x1='355' y1='355' x2='480' y2='390'/%3E%3Cline class='e' x1='420' y1='220' x2='460' y2='320'/%3E%3Cline class='e' x1='420' y1='220' x2='505' y2='270'/%3E%3Cline class='e' x1='505' y1='270' x2='460' y2='320'/%3E%3Cline class='e' x1='505' y1='270' x2='480' y2='390'/%3E%3Cline class='e' x1='480' y1='390' x2='460' y2='320'/%3E%3Cline class='e' x1='480' y1='390' x2='530' y2='440'/%3E%3Cline class='e' x1='355' y1='430' x2='530' y2='440'/%3E%3Ccircle class='nb' cx='295' cy='185' r='24'/%3E%3Ccircle class='nb' cx='310' cy='295' r='26'/%3E%3Ccircle class='nb' cx='265' cy='340' r='22'/%3E%3Ccircle class='nb' cx='420' cy='220' r='26'/%3E%3Ccircle class='nb' cx='460' cy='320' r='22'/%3E%3Ccircle class='nb' cx='505' cy='270' r='20'/%3E%3Ccircle class='nb' cx='355' cy='430' r='24'/%3E%3Ccircle class='nb' cx='530' cy='440' r='22'/%3E%3Ccircle class='no' cx='190' cy='220' r='40'/%3E%3Ccircle class='no' cx='355' cy='355' r='46'/%3E%3Ccircle class='no' cx='480' cy='390' r='34'/%3E%3C/svg%3E" />

  <!-- MapLibre GL JS -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <!-- PapaParse (CSV parsing) -->
  <script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="app-header">
    <div class="header-inner">
      <span class="header-logo">
        <svg width="32" height="32" viewBox="140 150 420 320" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <style>.e{stroke:#3a5f82;stroke-width:6;fill:none;stroke-linecap:round}.nb{fill:#4d90c4}.no{fill:#e8962a}</style>
          <line class="e" x1="190" y1="220" x2="310" y2="295"/>
          <line class="e" x1="190" y1="220" x2="295" y2="185"/>
          <line class="e" x1="190" y1="220" x2="265" y2="340"/>
          <line class="e" x1="295" y1="185" x2="420" y2="220"/>
          <line class="e" x1="265" y1="340" x2="310" y2="295"/>
          <line class="e" x1="265" y1="340" x2="355" y2="430"/>
          <line class="e" x1="355" y1="355" x2="310" y2="295"/>
          <line class="e" x1="355" y1="355" x2="420" y2="220"/>
          <line class="e" x1="355" y1="355" x2="460" y2="320"/>
          <line class="e" x1="355" y1="355" x2="355" y2="430"/>
          <line class="e" x1="355" y1="355" x2="480" y2="390"/>
          <line class="e" x1="420" y1="220" x2="460" y2="320"/>
          <line class="e" x1="420" y1="220" x2="505" y2="270"/>
          <line class="e" x1="505" y1="270" x2="460" y2="320"/>
          <line class="e" x1="505" y1="270" x2="480" y2="390"/>
          <line class="e" x1="480" y1="390" x2="460" y2="320"/>
          <line class="e" x1="480" y1="390" x2="530" y2="440"/>
          <line class="e" x1="355" y1="430" x2="530" y2="440"/>
          <circle class="nb" cx="295" cy="185" r="24"/>
          <circle class="nb" cx="310" cy="295" r="26"/>
          <circle class="nb" cx="265" cy="340" r="22"/>
          <circle class="nb" cx="420" cy="220" r="26"/>
          <circle class="nb" cx="460" cy="320" r="22"/>
          <circle class="nb" cx="505" cy="270" r="20"/>
          <circle class="nb" cx="355" cy="430" r="24"/>
          <circle class="nb" cx="530" cy="440" r="22"/>
          <circle class="no" cx="190" cy="220" r="40"/>
          <circle class="no" cx="355" cy="355" r="46"/>
          <circle class="no" cx="480" cy="390" r="34"/>
        </svg>
      </span>
      <h1>Incident Map</h1>
      <span class="header-sub">Philippines</span>
    </div>
  </header>

  <main class="layout">

    <!-- Map panel -->
    <section class="map-panel">

      <!-- Layer switcher: top strip inside map panel -->
      <div class="layer-switcher" id="layerSwitcher">
        <label class="layer-btn active" data-layer="incidents">
          <input type="radio" name="layer" value="incidents" checked /> Incidents
        </label>
        <label class="layer-btn" data-layer="scoring">
          <input type="radio" name="layer" value="scoring" /> Scoring
        </label>
        <label class="layer-btn" data-layer="heatmap">
          <input type="radio" name="layer" value="heatmap" /> Heatmap
        </label>
        <label class="layer-btn" data-layer="metrics">
          <input type="radio" name="layer" value="metrics" /> Metrics
        </label>
      </div>

      <!-- map and metrics share this space -->
      <div class="map-content">
        <div id="map"></div>

        <div id="metricsPanel" class="metrics-panel" style="display:none;">
          <div class="metrics-inner">

            <div class="metrics-section">
              <h2 class="metrics-section-title">Weapons</h2>
              <div class="metrics-row">
                <div class="metrics-card">
                  <div class="metrics-card-title">Firearms by Type</div>
                  <div class="metrics-chart-wrap"><canvas id="chartFirearms"></canvas></div>
                </div>
                <div class="metrics-card">
                  <div class="metrics-card-title">Grenades &amp; Munitions by Type</div>
                  <div class="metrics-chart-wrap"><canvas id="chartGrenades"></canvas></div>
                </div>
                <div class="metrics-card metrics-card-narrow">
                  <div class="metrics-card-title">Ammunition</div>
                  <div class="metrics-chart-wrap"><canvas id="chartAmmo"></canvas></div>
                </div>
              </div>
            </div>

            <div class="metrics-section">
              <h2 class="metrics-section-title">Incidents</h2>
              <div class="metrics-row">
                <div class="metrics-card metrics-card-medium">
                  <div class="metrics-card-title">Incident Type Breakdown</div>
                  <div class="metrics-chart-wrap metrics-pie-wrap"><canvas id="chartIncidentType"></canvas></div>
                </div>
                <div class="metrics-card">
                  <div class="metrics-card-title">Convergence Incidents by Category</div>
                  <div class="metrics-chart-wrap"><canvas id="chartConvergence"></canvas></div>
                </div>
              </div>
            </div>

            <div class="metrics-section">
              <h2 class="metrics-section-title">Geography</h2>
              <div class="metrics-row">
                <div class="metrics-card metrics-card-wide">
                  <div class="metrics-card-title">Top 10 Provinces by Incident Count</div>
                  <div class="metrics-chart-wrap"><canvas id="chartProvinces"></canvas></div>
                </div>
              </div>
            </div>

          </div>
        </div>

        <div class="map-legend" id="mapLegend"></div>
      </div>

    </section>

    <!-- Resizable divider -->
    <div class="divider" id="divider"></div>

    <!-- Table panel -->
    <section class="table-panel">
      <div class="table-toolbar">
        <span class="table-count" id="tableCount">-- incidents</span>

        <div class="filter-group">
          <label class="filter-label">From</label>
          <input type="date" id="filterDateFrom" class="filter-input filter-date" />
        </div>
        <div class="filter-group">
          <label class="filter-label">To</label>
          <input type="date" id="filterDateTo" class="filter-input filter-date" />
        </div>

        <div class="filter-group">
          <label class="filter-label">Type</label>
          <select id="filterType" class="filter-input filter-select">
            <option value="">All types</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label">Tag</label>
          <select id="filterTag" class="filter-input filter-select">
            <option value="">All tags</option>
          </select>
        </div>

        <div class="filter-group">
          <label class="filter-label">Actors</label>
          <select id="filterActor" class="filter-input filter-select">
            <option value="">All actors</option>
          </select>
        </div>

        <div class="filter-group filter-search-group">
          <input type="text" id="filterSearch" class="filter-input filter-search" placeholder="Search…" />
        </div>

        <button id="filterReset" class="filter-reset" title="Clear all filters">✕</button>
      </div>
      <div class="table-scroll">
        <table id="incidentTable">
          <thead>
            <tr>
              <th data-col="Date">Date <span class="sort-icon">&#8597;</span></th>
              <th data-col="Incident Type">Type <span class="sort-icon">&#8597;</span></th>
              <th data-col="Title">Title <span class="sort-icon">&#8597;</span></th>
              <th data-col="Location">Location <span class="sort-icon">&#8597;</span></th>
              <th data-col="Score">Arms Score <span class="sort-icon">&#8597;</span></th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr class="placeholder-row">
              <td colspan="5">Loading incidents...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <script>
    // COLOR MAP BY INCIDENT TYPE
    const TYPE_COLORS = {
      'Seizure':            '#00b050',  // green
      'Diversion':          '#e53935',  // red
      'Illicit transfer':   '#cc00cc',  // magenta
      'Illicit use':        '#c8a800',  // golden yellow (legible on dark)
      'Illicit possession': '#c8a800',  // golden yellow
      'Illicit manufacture':'#ff9900',  // orange
      'Destruction':        '#4a4a4a',  // dark charcoal
      'UXO':                '#888888',  // mid-grey
      'Surrender':          '#4472c4',  // blue
      'Surrender/amnesty':  '#4472c4',  // blue
      'Armed clash':        '#e53935',  // red
      'IED':                '#ff9900',  // orange
      'Assassination':      '#9b59b6',  // purple
      'Kidnapping':         '#e91e63',  // pink
    };
    const DEFAULT_COLOR = '#8b949e';

    function typeColor(type) {
      if (!type) return DEFAULT_COLOR;
      for (const [key, val] of Object.entries(TYPE_COLORS)) {
        if (type.toLowerCase().includes(key.toLowerCase())) return val;
      }
      return DEFAULT_COLOR;
    }

    // MAP INITIALISATION
    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
      center: [122.0, 12.5],
      zoom: 5.5,
      minZoom: 4,
      maxZoom: 18,
    });

    map.addControl(new maplibregl.NavigationControl(), 'top-right');
    map.addControl(new maplibregl.ScaleControl({ unit: 'metric' }), 'bottom-left');

    // GLOBAL STATE
    let incidents = [];
    let sortCol = 'Date';
    let sortAsc = true;
    let activeRowId = null;
    let activePopup = null;

    // STEP 5: LOAD & PARSE CSV
    fetch('PHLdata.csv')
      .then(function(response) {
        console.log('Fetch status:', response.status, response.statusText);
        return response.text();
      })
      .then(function(text) {
        console.log('Raw text length:', text.length);
        console.log('First 200 chars:', JSON.stringify(text.substring(0, 200)));

        var results = Papa.parse(text, {
          header: true,
          skipEmptyLines: true,
          encoding: 'UTF-8',
        });

        console.log('Raw rows from CSV:', results.data.length);
        console.log('First row keys:', Object.keys(results.data[0] || {}));
        console.log('First row sample:', results.data[0]);

        incidents = results.data.filter(function(row) {
          return row['Latitude'] && row['Longitude'] &&
            !isNaN(parseFloat(row['Latitude'])) &&
            !isNaN(parseFloat(row['Longitude']));
        });
        console.log('Loaded incidents:', incidents.length);
        currentFilteredRows = incidents;

        if (map.loaded()) {
          addIncidentLayer();
        } else {
          map.on('load', addIncidentLayer);
        }

        buildFilters();
        // applyFilters() and buildLegend() called inside addIncidentLayer() once map is ready
        renderTable(incidents); // populate table immediately while map loads
      })
      .catch(function(err) {
        console.error('Fetch error:', err);
        document.getElementById('tableBody').innerHTML =
          '<tr class="placeholder-row"><td colspan="5">Error loading PHLdata.csv</td></tr>';
      });

    // CSV TO GEOJSON
    function toGeoJSON(rows) {
      return {
        type: 'FeatureCollection',
        features: rows.map(function(row, i) {
          return {
            type: 'Feature',
            id: i,
            geometry: {
              type: 'Point',
              coordinates: [parseFloat(row['Longitude']), parseFloat(row['Latitude'])]
            },
            properties: {
              id:            i,
              date:          row['Date']          || '',
              incident_type: row['Incident Type'] || '',
              title:         row['Title']         || '',
              location:      row['Location']      || '',
              barangay:      row['Barangay']      || '',
              municipality:  row['Municipality']  || '',
              province:      row['Province']      || '',
              score:         row['Score']         || '',
              convergence:   row['Convergence']   || '',
              tags:          row['Tags']          || '',
              source:        row['Source']        || '',
              color:         typeColor(row['Incident Type']),
            }
          };
        })
      };
    }

    // STEP 6: ADD POINT LAYER
    function addIncidentLayer() {
      var geojson = toGeoJSON(incidents);

      map.addSource('incidents', {
        type: 'geojson',
        data: geojson,
      });

      map.addLayer({
        id: 'incidents-halo',
        type: 'circle',
        source: 'incidents',
        paint: {
          'circle-radius': 14,
          'circle-color': ['get', 'color'],
          'circle-opacity': 0,
          'circle-blur': 0.6,
        }
      });

      map.addLayer({
        id: 'incidents-circles',
        type: 'circle',
        source: 'incidents',
        paint: {
          'circle-radius': [
            'interpolate', ['linear'], ['zoom'],
            5, 5,
            10, 9
          ],
          'circle-color': ['get', 'color'],
          'circle-stroke-width': 1.5,
          'circle-stroke-color': '#fff',
          'circle-opacity': 0.88,
        }
      });

      map.on('click', 'incidents-circles', function(e) {
        var props = e.features[0].properties;
        var rowId = props.id;

        if (activePopup) activePopup.remove();

        activePopup = new maplibregl.Popup({ maxWidth: '280px', offset: 12 })
          .setLngLat(e.features[0].geometry.coordinates)
          .setHTML(
            '<strong>' + props.incident_type + '</strong>' +
            '<div class="popup-title">' + props.title + '</div>' +
            '<div class="popup-meta">' +
            '<span>Date: ' + props.date + '</span>' +
            (props.barangay    ? '<span>' + props.barangay + '</span>' : '') +
            (props.municipality ? '<span>' + props.municipality + (props.province ? ', ' + props.province : '') + '</span>' : (props.province ? '<span>' + props.province + '</span>' : '')) +
            (props.score ? '<span>Score: ' + parseFloat(props.score).toFixed(1) + '</span>' : '') +
            (props.convergence ? '<span>Convergence: ' + props.convergence + '</span>' : '') +
            '</div>'
          )
          .addTo(map);

        highlightRow(rowId);
      });

      map.on('mouseenter', 'incidents-circles', function() {
        map.getCanvas().style.cursor = 'pointer';
      });
      map.on('mouseleave', 'incidents-circles', function() {
        map.getCanvas().style.cursor = '';
      });

      console.log('Incident layer added');
      buildLegend();
      applyFilters();
    }


    // FILTERS
    function normaliseTag(t) {
      return t.trim().toLowerCase().replace(/\b\w/g, function(c){ return c.toUpperCase(); });
    }

    function buildFilters() {
      // Populate type dropdown
      var types = Array.from(new Set(incidents.map(function(r){ return (r['Incident Type']||'').trim(); }).filter(Boolean))).sort();
      var typeEl = document.getElementById('filterType');
      types.forEach(function(t){
        var o = document.createElement('option'); o.value = t; o.textContent = t; typeEl.appendChild(o);
      });

      // Populate tag dropdown — split on newline, normalise case, exclude incident types
      var incidentTypes = new Set(incidents.map(function(r){ return (r['Incident Type']||'').trim().toLowerCase(); }));
      // Also exclude partial-match type-adjacent tags
      ['illicit possession','illicit transfer','illicit manufacture'].forEach(function(t){ incidentTypes.add(t); });
      var tagSet = {};
      incidents.forEach(function(r){
        var raw = r['Tags'] || '';
        raw.split(/[\n,]/).forEach(function(t){
          var n = normaliseTag(t);
          if (n && !incidentTypes.has(n.toLowerCase())) tagSet[n] = true;
        });
      });
      var tags = Object.keys(tagSet).sort();
      var tagEl = document.getElementById('filterTag');
      tags.forEach(function(t){
        var o = document.createElement('option'); o.value = t; o.textContent = t; tagEl.appendChild(o);
      });

      // Populate actor dropdown from Actor Categories field
      var actorSet = {};
      incidents.forEach(function(r){
        (r['Actor Categories'] || '').split('\n').forEach(function(a){
          a = a.trim();
          if (a) actorSet[a] = true;
        });
      });
      var actorEl = document.getElementById('filterActor');
      Object.keys(actorSet).sort().forEach(function(a){
        var o = document.createElement('option'); o.value = a; o.textContent = a; actorEl.appendChild(o);
      });

      // Wire up all filter inputs
      ['filterDateFrom','filterDateTo','filterType','filterTag','filterActor','filterSearch'].forEach(function(id){
        document.getElementById(id).addEventListener('input', applyFilters);
      });

      document.getElementById('filterReset').addEventListener('click', function(){
        document.getElementById('filterDateFrom').value = '';
        document.getElementById('filterDateTo').value = '';
        document.getElementById('filterType').value = '';
        document.getElementById('filterTag').value = '';
        document.getElementById('filterActor').value = '';
        document.getElementById('filterSearch').value = '';
        applyFilters();
      });
    }

    var MONTHS = {
      'January':'01','February':'02','March':'03','April':'04','May':'05','June':'06',
      'July':'07','August':'08','September':'09','October':'10','November':'11','December':'12'
    };

    function toISO(d) {
      // Parse 'DD Month YYYY' -> 'YYYY-MM-DD' for date filter comparisons
      if (!d) return '';
      var parts = d.trim().split(' ');
      if (parts.length === 3 && MONTHS[parts[1]]) {
        return parts[2] + '-' + MONTHS[parts[1]] + '-' + parts[0].padStart(2, '0');
      }
      // Fallback: M/D/YYYY or MM/DD/YYYY
      var slashParts = d.split('/');
      if (slashParts.length === 3) {
        return slashParts[2] + '-' + slashParts[0].padStart(2,'0') + '-' + slashParts[1].padStart(2,'0');
      }
      return d;
    }

    function applyFilters() {
      var dateFrom = document.getElementById('filterDateFrom').value;
      var dateTo   = document.getElementById('filterDateTo').value;
      var typeVal  = document.getElementById('filterType').value;
      var tagVal   = document.getElementById('filterTag').value;
      var actorVal = document.getElementById('filterActor').value;
      var search   = document.getElementById('filterSearch').value.toLowerCase().trim();

      var filtered = incidents.filter(function(row) {
        var d = toISO(row['Date'] || '');
        if (dateFrom && d < dateFrom) return false;
        if (dateTo   && d > dateTo)   return false;
        if (typeVal  && (row['Incident Type']||'').trim() !== typeVal) return false;
        if (tagVal) {
          var rowTags = (row['Tags']||'').split(/[\n,]/).map(normaliseTag);
          if (!rowTags.includes(tagVal)) return false;
        }
        if (actorVal) {
          var rowActors = (row['Actor Categories']||'').split('\n').map(function(a){ return a.trim(); });
          if (!rowActors.includes(actorVal)) return false;
        }
        if (search) {
          var haystack = [row['Title'],row['Location'],row['Incident Type'],row['Tags'],row['Description'],row['Actors'],row['Weapons']].join(' ').toLowerCase();
          if (!haystack.includes(search)) return false;
        }
        return true;
      });

      // Update map layer
      if (map.getSource('incidents')) {
        map.getSource('incidents').setData(toGeoJSON(filtered));
      }

      currentFilteredRows = filtered;
      renderTable(filtered);

      if (document.getElementById('metricsPanel').style.display !== 'none') {
        renderMetrics(filtered);
      }
    }

    // LEGEND
    function buildLegend() {
      var usedTypes = {};
      incidents.forEach(function(row) {
        var t = row['Incident Type'] || 'Unknown';
        if (!usedTypes[t]) usedTypes[t] = typeColor(t);
      });

      var html = '<div class="legend-title">Incident Type</div>';
      Object.entries(usedTypes).sort(function(a,b){ return a[0].localeCompare(b[0]); }).forEach(function(entry) {
        html += '<div class="legend-row">' +
          '<span class="legend-swatch" style="background:' + entry[1] + '"></span>' +
          '<span class="legend-label">' + entry[0] + '</span>' +
          '</div>';
      });

      document.getElementById('mapLegend').innerHTML = html;
    }

    // STEP 7: RENDER TABLE
    function escHtml(s) {
      return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function buildWeaponsHtml(row) {
      var text = (row['Weapons'] || '').trim();
      if (!text) return '<span class="expand-none">No weapons recorded</span>';
      var lines = text.split(/\n/).map(function(s){ return s.trim(); }).filter(Boolean);
if (lines.length === 1) lines = text.split(/;/).map(function(s){ return s.trim(); }).filter(Boolean);
      return lines.map(function(l){ return '<div class="expand-text">' + escHtml(l) + '</div>'; }).join('');
    }

    function renderTable(rows) {
      var tbody = document.getElementById('tableBody');
      document.getElementById('tableCount').textContent =
        rows.length + ' incident' + (rows.length !== 1 ? 's' : '');

      if (!rows.length) {
        tbody.innerHTML = '<tr class="placeholder-row"><td colspan="5">No incidents to display.</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(function(row) {
        var origIdx = incidents.indexOf(row);
        var color = typeColor(row['Incident Type']);
        var title = (row['Title'] || '--');
        var titleShort = title.length > 90 ? title.substring(0, 90) + '...' : title;
        var loc = (row['Location'] || '--');
        var locShort = loc.length > 40 ? loc.substring(0, 40) + '...' : loc;
        var desc = escHtml(row['Description'] || '');
        var weapons = buildWeaponsHtml(row);
        var isActive = origIdx === activeRowId;

        return '<tr data-id="' + origIdx + '" class="main-row' + (isActive ? ' active' : '') + '">' +
          '<td>' + (row['Date'] || '--') + '</td>' +
          '<td><span class="type-badge" style="background:' + color + '">' + escHtml(row['Incident Type'] || '--') + '</span></td>' +
          '<td title="' + escHtml(title) + '">' + escHtml(titleShort) + '</td>' +
          '<td title="' + escHtml(loc) + '">' + escHtml(locShort) + '</td>' +
          '<td>' + (row['Score'] ? parseFloat(row['Score']).toFixed(1) : '--') + '</td>' +
          '</tr>' +
          '<tr class="expand-row" data-expand-id="' + origIdx + '">' +
          '<td colspan="5">' +
          '<div class="expand-body">' +
          (desc ? '<div class="expand-section"><div class="expand-label">Description</div><div class="expand-text">' + desc + '</div></div>' : '') +
          '<div class="expand-section"><div class="expand-label">Weapons</div><div class="expand-weapons">' + weapons + '</div></div>' +
          '</div>' +
          '</td>' +
          '</tr>';
      }).join('');

      tbody.querySelectorAll('tr.main-row').forEach(function(tr) {
        tr.addEventListener('click', function() {
          var id = parseInt(tr.dataset.id);
          var row = incidents[id];
          var lng = parseFloat(row['Longitude']);
          var lat = parseFloat(row['Latitude']);

          // Toggle expand row
          var expandRow = tbody.querySelector('tr.expand-row[data-expand-id="' + id + '"]');
          var isOpen = expandRow.classList.contains('open');

          // Close all other expand rows
          tbody.querySelectorAll('tr.expand-row.open').forEach(function(er) { er.classList.remove('open'); });

          if (!isOpen) expandRow.classList.add('open');

          // Fly and popup
          map.flyTo({ center: [lng, lat], zoom: 10, speed: 1.2 });

          if (activePopup) activePopup.remove();
          activePopup = new maplibregl.Popup({ maxWidth: '280px', offset: 12 })
            .setLngLat([lng, lat])
            .setHTML(
              '<strong>' + escHtml(row['Incident Type'] || '') + '</strong>' +
              '<div class="popup-title">' + escHtml(row['Title'] || '') + '</div>' +
              '<div class="popup-meta">' +
              '<span>Date: ' + escHtml(row['Date'] || '') + '</span>' +
              (row['Barangay']     ? '<span>' + escHtml(row['Barangay']) + '</span>' : '') +
              (row['Municipality'] ? '<span>' + escHtml(row['Municipality']) + (row['Province'] ? ', ' + escHtml(row['Province']) : '') + '</span>' : (row['Province'] ? '<span>' + escHtml(row['Province']) + '</span>' : '')) +
              (row['Score']       ? '<span>Score: ' + parseFloat(row['Score']).toFixed(1) + '</span>' : '') +
              (row['Convergence'] ? '<span>Convergence: ' + escHtml(row['Convergence']) + '</span>' : '') +
              '</div>'
            )
            .addTo(map);

          highlightRow(id);
        });
      });
    }

    // STEP 8: HIGHLIGHT ROW + MARKER
    function highlightRow(id) {
      activeRowId = id;
      document.querySelectorAll('#tableBody tr.main-row').forEach(function(tr) {
        tr.classList.toggle('active', parseInt(tr.dataset.id) === id);
      });
      var activeEl = document.querySelector('#tableBody tr.main-row[data-id="' + id + '"]');
      if (activeEl) activeEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }

    // COLUMN SORTING
    document.querySelectorAll('#incidentTable thead th[data-col]').forEach(function(th) {
      th.addEventListener('click', function() {
        var col = th.dataset.col;
        if (sortCol === col) {
          sortAsc = !sortAsc;
        } else {
          sortCol = col;
          sortAsc = true;
        }

        var sorted = incidents.slice().sort(function(a, b) {
          var av = a[col] || '';
          var bv = b[col] || '';
          if (col === 'Score') return sortAsc ? parseFloat(av||0) - parseFloat(bv||0) : parseFloat(bv||0) - parseFloat(av||0);
          return sortAsc ? av.localeCompare(bv) : bv.localeCompare(av);
        });

        document.querySelectorAll('.sort-icon').forEach(function(el) { el.textContent = String.fromCharCode(8597); });
        th.querySelector('.sort-icon').textContent = sortAsc ? String.fromCharCode(8593) : String.fromCharCode(8595);

        renderTable(sorted);
      });
    });

    // LAYER SWITCHER
    document.querySelectorAll('.layer-btn input').forEach(function(radio) {
      radio.addEventListener('change', function(e) {
        document.querySelectorAll('.layer-btn').forEach(function(b) { b.classList.remove('active'); });
        e.target.closest('.layer-btn').classList.add('active');
        var val = e.target.value;
        var metricsPanel = document.getElementById('metricsPanel');
        var mapEl = document.getElementById('map');
        var legend = document.getElementById('mapLegend');
        if (val === 'metrics') {
          metricsPanel.style.display = 'block';
          mapEl.style.display = 'none';
          if (legend) legend.style.display = 'none';
          renderMetrics(currentFilteredRows);
        } else {
          metricsPanel.style.display = 'none';
          mapEl.style.display = 'block';
          if (legend) legend.style.display = '';
          if (window.map) map.resize();
        }
      });
    });

    // ── METRICS ─────────────────────────────────────────────────

    var currentFilteredRows = [];
    var metricsCharts = {};

    var FIREARM_GROUPS = [
      { label: 'Unspecified',      cols: ['Unspecified'] },
      { label: 'Handgun',          cols: ['Pistol', 'Revolver', 'Craft handgun'] },
      { label: 'Assault Rifle',    cols: ['Assault Rifle'] },
      { label: 'Rifle',            cols: ['Rifle', 'Craft Rifle'] },
      { label: 'Shotgun',          cols: ['Shotgun', 'Craft Shotgun'] },
      { label: 'Submachine Gun',   cols: ['SMG', 'Craft SMG'] },
      { label: 'Machine Gun',      cols: ['LMG', 'HMG'] },
      { label: 'Grenade Launcher', cols: ['GL', 'AGL'] },
      { label: 'Anti-tank',        cols: ['RPG/ATW', 'Craft RPG'] },
      { label: 'Mortar',           cols: ['Mortar'] },
      { label: 'Advanced Weapon',  cols: ['ATGM', 'MANPADS'] },
    ];

    var GRENADE_GROUPS = [
      { label: 'Hand Grenade',      cols: ['Hand Grenade'] },
      { label: 'Projected Grenade', cols: ['Projected Gren'] },
      { label: 'Rifle Grenade',     cols: ['Rifle Gren'] },
      { label: 'Munition',          cols: ['Munition'] },
    ];

    function sumGroups(rows, groups) {
      return groups.map(function(g) {
        var total = 0;
        rows.forEach(function(row) {
          g.cols.forEach(function(col) {
            var v = parseFloat(row[col]);
            if (!isNaN(v)) total += v;
          });
        });
        return { label: g.label, value: total };
      });
    }

    function sumCol(rows, col) {
      var total = 0;
      rows.forEach(function(row) {
        var v = parseFloat(row[col]);
        if (!isNaN(v)) total += v;
      });
      return total;
    }

    function destroyChart(id) {
      if (metricsCharts[id]) { metricsCharts[id].destroy(); delete metricsCharts[id]; }
    }

    var CHART_DEFAULTS = {
      color: '#c9d1d9',
      gridColor: 'rgba(255,255,255,0.06)',
      accent: '#e8962a',
      blue: '#4d90c4',
    };

    function makeHorizBar(canvasId, labels, data, color) {
      destroyChart(canvasId);
      var ctx = document.getElementById(canvasId);
      if (!ctx) return;
      var pairs = labels.map(function(l,i){ return {l:l,v:data[i]}; }).filter(function(p){ return p.v > 0; });
      if (!pairs.length) { ctx.parentNode.innerHTML = '<div class="metrics-empty">No data</div>'; return; }
      pairs.sort(function(a,b){ return b.v - a.v; });
      metricsCharts[canvasId] = new Chart(ctx, {
        type: 'bar',
        data: { labels: pairs.map(function(p){return p.l;}), datasets: [{ data: pairs.map(function(p){return p.v;}), backgroundColor: color||CHART_DEFAULTS.accent, borderRadius: 3, borderSkipped: false }] },
        options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: CHART_DEFAULTS.color, font:{size:11} }, grid: { color: CHART_DEFAULTS.gridColor }, border: { color: 'transparent' } },
            y: { ticks: { color: CHART_DEFAULTS.color, font:{size:11} }, grid: { display: false }, border: { color: 'transparent' } }
          }
        }
      });
    }

    function makeVertBar(canvasId, labels, data, colors) {
      destroyChart(canvasId);
      var ctx = document.getElementById(canvasId);
      if (!ctx) return;
      if (!data.some(function(v){return v>0;})) { ctx.parentNode.innerHTML = '<div class="metrics-empty">No data</div>'; return; }
      metricsCharts[canvasId] = new Chart(ctx, {
        type: 'bar',
        data: { labels: labels, datasets: [{ data: data, backgroundColor: colors||CHART_DEFAULTS.accent, borderRadius: 3, borderSkipped: false }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: CHART_DEFAULTS.color, font:{size:11}, maxRotation: 30 }, grid: { display: false }, border: { color: 'transparent' } },
            y: { ticks: { color: CHART_DEFAULTS.color, font:{size:11} }, grid: { color: CHART_DEFAULTS.gridColor }, border: { color: 'transparent' } }
          }
        }
      });
    }

    function makePie(canvasId, labels, data) {
      destroyChart(canvasId);
      var ctx = document.getElementById(canvasId);
      if (!ctx) return;
      if (!data.some(function(v){return v>0;})) { ctx.parentNode.innerHTML = '<div class="metrics-empty">No data</div>'; return; }
      var PIE_COLORS = ['#e8962a','#4d90c4','#00b050','#e53935','#cc00cc','#9b59b6','#4472c4','#c8a800','#e91e63','#888888','#3a7abf','#d4791e'];
      metricsCharts[canvasId] = new Chart(ctx, {
        type: 'pie',
        data: { labels: labels, datasets: [{ data: data, backgroundColor: labels.map(function(l,i){ return typeColor(l) !== DEFAULT_COLOR ? typeColor(l) : PIE_COLORS[i%PIE_COLORS.length]; }), borderColor: '#161b22', borderWidth: 2 }] },
        options: { responsive: true, maintainAspectRatio: false,
          plugins: { legend: { position: 'right', labels: { color: CHART_DEFAULTS.color, font:{size:11}, padding:10, boxWidth:12 } } }
        }
      });
    }

    function makeSingleBar(canvasId, value) {
      destroyChart(canvasId);
      var ctx = document.getElementById(canvasId);
      if (!ctx) return;
      if (!value) { ctx.parentNode.innerHTML = '<div class="metrics-empty">No data</div>'; return; }
      metricsCharts[canvasId] = new Chart(ctx, {
        type: 'bar',
        data: { labels: ['Rounds / items'], datasets: [{ data: [value], backgroundColor: CHART_DEFAULTS.blue, borderRadius: 4, borderSkipped: false }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: function(ctx){ return ' ' + ctx.raw.toLocaleString() + ' rounds/items'; } } } },
          scales: {
            x: { ticks: { color: CHART_DEFAULTS.color, font:{size:11} }, grid:{display:false}, border:{color:'transparent'} },
            y: { ticks: { color: CHART_DEFAULTS.color, font:{size:11} }, grid:{color:CHART_DEFAULTS.gridColor}, border:{color:'transparent'} }
          }
        }
      });
    }

    function renderMetrics(rows) {
      if (!rows || !rows.length) rows = incidents;

      var firearmData = sumGroups(rows, FIREARM_GROUPS);
      makeHorizBar('chartFirearms', firearmData.map(function(d){return d.label;}), firearmData.map(function(d){return d.value;}), CHART_DEFAULTS.accent);

      var grenadeData = sumGroups(rows, GRENADE_GROUPS);
      makeHorizBar('chartGrenades', grenadeData.map(function(d){return d.label;}), grenadeData.map(function(d){return d.value;}), '#c0392b');

      makeSingleBar('chartAmmo', sumCol(rows, 'Ammo'));

      var typeCounts = {};
      rows.forEach(function(r){ var t=(r['Incident Type']||'Unknown').trim(); typeCounts[t]=(typeCounts[t]||0)+1; });
      var typeEntries = Object.entries(typeCounts).sort(function(a,b){return b[1]-a[1];});
      makePie('chartIncidentType', typeEntries.map(function(e){return e[0];}), typeEntries.map(function(e){return e[1];}));

      var CONVERGENCE_CATEGORIES = [
        'Drug trafficking', 'Human trafficking', 'Wildlife trafficking',
        'Illicit business', 'Environmental crime', 'Illicit goods', 'Criminal services'
      ];
      var convCounts = {};
      rows.forEach(function(r){
        (r['Convergence']||'').trim().split(/[,;\n\r]+/).forEach(function(c){
          c = c.trim();
          if (!c) return;
          var match = CONVERGENCE_CATEGORIES.find(function(cat){ return c.toLowerCase().startsWith(cat.toLowerCase()); });
          if (match) convCounts[match] = (convCounts[match]||0) + 1;
        });
      });
      var convEntries = Object.entries(convCounts).sort(function(a,b){return b[1]-a[1];});
      if (convEntries.length) makeHorizBar('chartConvergence', convEntries.map(function(e){return e[0];}), convEntries.map(function(e){return e[1];}), CHART_DEFAULTS.blue);
      else { var el=document.getElementById('chartConvergence'); if(el) el.parentNode.innerHTML='<div class="metrics-empty">No convergence data</div>'; }

      var provCounts = {};
      rows.forEach(function(r){ var p=(r['Province']||'').trim(); if(p) provCounts[p]=(provCounts[p]||0)+1; });
      var provEntries = Object.entries(provCounts).sort(function(a,b){return b[1]-a[1];}).slice(0,10);
      makeVertBar('chartProvinces', provEntries.map(function(e){return e[0];}), provEntries.map(function(e){return e[1];}), provEntries.map(function(_,i){return i%2===0?CHART_DEFAULTS.accent:CHART_DEFAULTS.blue;}));
    }
  </script>

  <style>
    /* metrics panel fills .map-content */
    .metrics-panel {
      position: absolute;
      inset: 0;
      background: #0d1117;
      overflow-y: auto;
      z-index: 10;
    }
    .metrics-inner { padding: 16px 16px 32px; }
    .metrics-section { margin-bottom: 24px; }
    .metrics-section-title {
      font-family: 'Georgia', serif;
      font-size: 11px; font-weight: 600;
      letter-spacing: .12em; text-transform: uppercase;
      color: #e8962a;
      border-bottom: 1px solid #21262d;
      padding-bottom: 6px; margin: 0 0 12px 0;
    }
    .metrics-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .metrics-card {
      flex: 1 1 200px;
      background: #161b22; border: 1px solid #21262d;
      border-radius: 6px; padding: 12px 14px 14px;
      display: flex; flex-direction: column;
    }
    .metrics-card-narrow { flex: 0 1 150px; }
    .metrics-card-medium { flex: 0 1 240px; }
    .metrics-card-wide   { flex: 1 1 360px; }
    .metrics-card-title {
      font-size: 10px; font-weight: 600;
      letter-spacing: .04em; text-transform: uppercase;
      color: #8b949e; margin-bottom: 10px;
    }
    .metrics-chart-wrap { position: relative; flex: 1; min-height: 140px; }
    .metrics-pie-wrap   { min-height: 180px; }
    #chartFirearms { min-height: 260px; }
    .metrics-chart-wrap:has(#chartFirearms) { min-height: 260px; }
    #chartProvinces { min-height: 300px; }
    .metrics-chart-wrap:has(#chartProvinces) { min-height: 300px; }
    .metrics-empty {
      display: flex; align-items: center; justify-content: center;
      height: 100%; min-height: 80px;
      font-size: 11px; color: #484f58; font-style: italic;
    }
    .map-legend { z-index: 11; }

    .popup-title {
      font-size: 12px;
      font-weight: 500;
      margin: 4px 0 6px;
      line-height: 1.4;
      color: #e6edf3;
    }
    .popup-meta {
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 11.5px;
      color: #8b949e;
    }
  </style>

  <script>
    // RESIZABLE SPLIT PANE
    (function() {
      var divider = document.getElementById('divider');
      var layout  = divider.closest('.layout');
      var dragging = false;

      divider.addEventListener('mousedown', function(e) {
        dragging = true;
        divider.classList.add('dragging');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });

      document.addEventListener('mousemove', function(e) {
        if (!dragging) return;
        var rect  = layout.getBoundingClientRect();
        var leftW = e.clientX - rect.left;
        var total = rect.width - 8; // subtract divider width
        leftW = Math.max(200, Math.min(leftW, total - 200)); // min 200px each side
        var pct = (leftW / rect.width * 100).toFixed(2);
        layout.style.gridTemplateColumns = pct + '% 8px 1fr';
        // tell MapLibre the container resized
        if (window.map) map.resize();
      });

      document.addEventListener('mouseup', function() {
        if (!dragging) return;
        dragging = false;
        divider.classList.remove('dragging');
        document.body.style.cursor = '';
        document.body.style.userSelect = '';
        if (window.map) map.resize();
      });
    })();
  </script>
